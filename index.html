<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Housekeeping</title>
  <style>
    * {box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif;}
    body {background:#f5f5f5; padding:15px; max-width:750px; margin:0 auto;}
    .header {background:#0a2351; color:white; padding:18px; border-radius:8px; margin-bottom:20px; text-align:center;}
    .card {background:white; padding:18px; border-radius:8px; margin:15px 0; box-shadow:0 1px 4px #ccc;}
    .btn {padding:12px; border:none; border-radius:6px; font-weight:bold; font-size:16px; cursor:pointer;}
    .btn-biru {background:#0d6efd; color:white; width:100%; margin-top:10px;}
    .btn-hijau {background:#28a745; color:white;}
    .btn-kuning {background:#ffc107; color:#000;}
    .row {display:flex; gap:4%; margin:10px 0; flex-wrap:wrap;}
    .col {width:48%; margin-bottom:10px;}
    .col-3 {width:31%; margin-bottom:10px;}
    input, select {width:100%; padding:9px; border:1px solid #ddd; border-radius:4px; font-size:14px;}
    h3 {font-size:16px; color:#0a2351; margin-bottom:12px; padding-bottom:5px; border-bottom:1px solid #eee;}
    .info {background:#e7f0ff; padding:10px; border-radius:6px; margin:10px 0; font-size:14px;}
    #halamanLogin, #halamanSupervisor, #halamanRoomboy {display:none;}
  </style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div id="halamanLoginTampil">
  <div class="header"><h2>LOGIN SISTEM HOUSEKEEPING</h2></div>
  <div class="card">
    <div class="col">
      <label>Username</label>
      <input type="text" id="user" placeholder="Masukkan Username" required>
    </div>
    <div class="col">
      <label>Password</label>
      <input type="password" id="pass" placeholder="Masukkan Password" required>
    </div>
    <button class="btn btn-biru" onclick="login()">MASUK</button>
    <p id="pesan" style="margin-top:10px; color:red; text-align:center;"></p>
  </div>
</div>

<!-- HALAMAN SUPERVISOR -->
<div id="halamanSupervisor">
  <div class="header">
    <h2>HALAMAN SUPERVISOR</h2>
    <p>Tanggal: <span id="tglSupervisor"></span></p>
  </div>
  <div class="card">
    <h3>Bagikan Kamar ke Petugas</h3>
    <div class="col">
      <label>Pilih Roomboy</label>
      <select id="pilihPetugas"></select>
    </div>
    <div class="col">
      <label>Shift</label>
      <select id="shiftBagi">
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Night">Night</option>
      </select>
    </div>
    <div class="col">
      <label>Daftar Nomor Kamar (pisah dengan koma)</label>
      <input type="text" id="daftarKamarInput" placeholder="Contoh: 201,202,203,204">
    </div>
    <button class="btn btn-hijau" onclick="bagikanKamar()" style="width:100%; margin-top:15px;">✅ BAGIKAN KAMAR</button>
  </div>
</div>

<!-- HALAMAN ROOMBOY -->
<div id="halamanRoomboy">
  <div class="header">
    <h2>LEMBAR KERJA ROOMBOY</h2>
    <p>Tanggal: <span id="tglRoomboy"></span></p>
    <div class="info">👤 Nama: <span id="namaRoomboy"></span> &nbsp; | &nbsp; ⏰ Shift: <span id="shiftRoomboy"></span></div>
    <div class="info">📋 Kamar Hari Ini: <strong id="kamarRoomboy"></strong></div>
  </div>

  <div class="card">
    <h3>Informasi Pekerjaan</h3>
    <div class="row">
      <div class="col"><label>No Urut</label><input type="number" id="noUrut" min="1"></div>
      <div class="col"><label>No Kamar</label><select id="pilihKamar"></select></div>
      <div class="col"><label>FO Status</label>
        <select id="foStatus">
          <option value="ED">ED</option><option value="EA">EA</option><option value="VD">VD</option>
          <option value="VC">VC</option><option value="OD">OD</option><option value="OC">OC</option>
        </select>
      </div>
      <div class="col"><label>Status Kamar</label>
        <select id="roomStatus">
          <option value="VC">VC - Bersih Kosong</option><option value="VD">VD - Kotor Kosong</option>
          <option value="OC">OC - Bersih Terisi</option><option value="OD">OD - Kotor Terisi</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:15px;">
      <button class="btn btn-kuning" onclick="mulaiKerja()">⏱️ MULAI</button>
      <button class="btn btn-hijau" onclick="selesaiKerja()">✅ SELESAI & SIMPAN</button>
    </div>
    <p style="margin-top:10px;">Mulai: <span id="waktuMulai">--:--</span> | Selesai: <span id="waktuSelesai">--:--</span></p>
  </div>

  <div class="card">
    <h3>Jumlah Perlengkapan</h3>
    <div class="row">
      <div class="col-3"><label>Sheet In</label><input type="number" id="sheetIn" min="0" value="0"></div>
      <div class="col-3"><label>Sheet Out</label><input type="number" id="sheetOut" min="0" value="0"></div>
      <div class="col-3"><label>Sampo</label><input type="number" id="sampo" min="0" value="0"></div>
      <div class="col-3"><label>Tisu</label><input type="number" id="tisu" min="0" value="0"></div>
      <div class="col-3"><label>Sabun</label><input type="number" id="sabun" min="0" value="0"></div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFri853Hjng0PCkRSkfIaxYzC2LbhWSoVAPZzWiy1gQvXf5mXuAqJyH2KESWmd5tAr/exec";
let namaPengguna = "";
let shiftSaya = "";
let daftarKamar = [];
let waktuMulai = "";

// Tampilkan tanggal hari ini
document.getElementById("tglSupervisor").textContent = new Date().toLocaleDateString("id-ID");
document.getElementById("tglRoomboy").textContent = new Date().toLocaleDateString("id-ID");

async function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  const pesan = document.getElementById("pesan");

  if (!user || !pass) return pesan.textContent = "⚠️ Isi semua kolom";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ aksi: "login", user, pass })
    });
    const hasil = await res.json();

    if (hasil.status === "sukses") {
      namaPengguna = hasil.nama;
      pesan.textContent = "";
      document.getElementById("halamanLoginTampil").style.display = "none";

      if (hasil.peran === "supervisor") {
        document.getElementById("halamanSupervisor").style.display = "block";
        muatDaftarPetugas();
      } else {
        document.getElementById("halamanRoomboy").style.display = "block";
        document.getElementById("namaRoomboy").textContent = namaPengguna;
        muatTugas();
      }
    } else {
      pesan.textContent = "❌ " + hasil.pesan;
    }
  } catch (err) {
    pesan.textContent = "❌ Gagal terhubung";
  }
}

async function muatDaftarPetugas() {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ aksi: "daftarPetugas" })
  });
  const hasil = await res.json();
  if (hasil.status === "sukses") {
    const pilih = document.getElementById("pilihPetugas");
    pilih.innerHTML = `<option value="">-- Pilih Roomboy --</option>`;
    hasil.daftar.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.nama;
      opt.textContent = p.nama;
      pilih.appendChild(opt);
    });
  }
}

async function bagikanKamar() {
  const nama = document.getElementById("pilihPetugas").value;
  const shift = document.getElementById("shiftBagi").value;
  const kamar = document.getElementById("daftarKamarInput").value.trim();

  if (!nama || !kamar) return alert("⚠️ Isi semua kolom");

  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ aksi: "bagikanKamar", namaPetugas: nama, shift, daftarKamar: kamar })
  });
  const hasil = await res.json();
  alert(hasil.pesan);
}

async function muatTugas() {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ aksi: "ambilTugas", namaPetugas: namaPengguna })
  });
  const hasil = await res.json();
  if (hasil.status === "ada") {
    shiftSaya = hasil.shift;
    daftarKamar = hasil.kamar;
    document.getElementById("shiftRoomboy").textContent = shiftSaya;
    document.getElementById("kamarRoomboy").textContent = daftarKamar.join(", ");
    const pilih = document.getElementById("pilihKamar");
    pilih.innerHTML = `<option value="">-- Pilih Kamar --</option>`;
    daftarKamar.forEach(k => {
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = k;
      pilih.appendChild(opt);
    });
  } else {
    alert("ℹ️ " + hasil.pesan);
  }
}

function mulaiKerja() {
  waktuMulai = new Date().toLocaleTimeString("id-ID");
  document.getElementById("waktuMulai").textContent = waktuMulai;
}

async function selesaiKerja() {
  if (!waktuMulai) return alert("⚠️ Tekan tombol MULAI dulu");
  const waktuSelesai = new Date().toLocaleTimeString("id-ID");

  const data = {
    aksi: "simpanHasil",
    namaPetugas: namaPengguna,
    shift: shiftSaya,
    noUrut: document.getElementById("noUrut").value,
    noKamar: document.getElementById("pilihKamar").value,
    foStatus: document.getElementById("foStatus").value,
    roomStatus: document.getElementById("roomStatus").value,
    timeIn: waktuMulai,
    timeOut: waktuSelesai,
    sheetDblIn: document.getElementById("sheetIn").value,
    sheetDblOut: document.getElementById("sheetOut").value,
    shampoo: document.getElementById("sampo").value,
    handSoap: document.getElementById("sabun").value,
    tissueRoll: document.getElementById("tisu").value
  };

  const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
  const hasil = await res.json();
  if (hasil.status === "berhasil") {
    alert("✅ Data tersimpan!");
    location.reload();
  }
}
</script>
</body>
</html>
